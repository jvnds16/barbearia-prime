<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Essential SEO meta tags -->
    <title>Barbearia Prime</title>
    <meta name="description" content="Barbearia Prime. Agende online serviços de corte de cabelo, barba e cuidados masculinos.">
    <meta name="keywords" content="Barbearia Prime, barbearia, corte masculino, barba, agendamento online">
    <meta name="author" content="Barbearia Prime">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="theme-color" content="#000000">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="%VITE_SITE_URL%/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Barbearia Prime | Agendamento Online" />
    <meta property="og:description" content="Agende online seu corte, barba e cuidados masculinos na Barbearia Prime." />
    <meta property="og:image" content="%VITE_SITE_URL%/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Barbearia Prime" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="%VITE_SITE_URL%/" />
    <meta property="twitter:title" content="Barbearia Prime | Agendamento Online" />
    <meta property="twitter:description" content="Agende online seu corte, barba e cuidados masculinos na Barbearia Prime." />
    <meta property="twitter:image" content="%VITE_SITE_URL%/logo.png" />
    
    <!-- Local business schema markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BarberShop",
      "name": "Barbearia Prime",
      "description": "Barbearia especializada em cortes de cabelo, barba e cuidados masculinos.",
      "url": "%VITE_SITE_URL%/",
      "telephone": "+55-27-98191-1375",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. s/n",
        "addressLocality": "Serra",
        "addressRegion": "ES",
        "addressCountry": "BR"
      },
      "openingHours": [
        "Mo-Sa 08:00-19:00"
      ],
      "priceRange": "R$ 30 - R$ 80",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços da Barbearia",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Corte de Cabelo",
              "description": "Corte de cabelo masculino com técnicas modernas"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Barba",
              "description": "Aparar e modelar barba com toalha quente e produtos premium"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Corte + Barba",
              "description": "Pacote completo com corte de cabelo e barba"
            }
          }
        ]
      }
    }
    </script>
    
    <!-- Preconnect for better font loading performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
      /* Loading screen styles */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f59e0b;
        border-top: 4px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        font-size: 18px;
        font-weight: 600;
        color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Carregando Barbearia Prime...</div>
    </div>

    <div id="root"></div>
    
    <script type="module">
      // Show loading screen
      const loadingScreen = document.getElementById('loading-screen');
      const root = document.getElementById('root');
      
      // Handle redirects for SPA
      (function() {
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect != location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      
      // Load the app
      import('./src/main.tsx')
        .then(() => {
          loadingScreen.style.display = 'none';
        })
        .catch(error => {
          console.error('Error loading application:', error);
          loadingScreen.innerHTML = `
            <div style="text-align: center; padding: 20px;">
              <div style="color: #ef4444; font-size: 48px; margin-bottom: 20px;">⚠️</div>
              <h2 style="color: #f59e0b; margin-bottom: 10px;">Erro ao carregar</h2>
              <p style="color: #d1d5db; margin-bottom: 20px;">Ocorreu um erro ao carregar a aplicação.</p>
              <button onclick="location.reload()" style="background: #f59e0b; color: black; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                Tentar Novamente
              </button>
            </div>
          `;
        });
    </script>
  </body>
</html>
